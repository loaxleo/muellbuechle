<!DOCTYPE html>

    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-sub: #6c757d;
            --search-bg: #ffffff;
            --border: #e9ecef;
            --input-focus: #007bff;
            --tag-bg: #eee;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #f8f9fa;
                --text-sub: #adb5bd;
                --search-bg: #2d2d2d;
                --border: #333333;
                --input-focus: #375a7f;
                --tag-bg: #333;
            }
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.3s ease;
        }

        .contact-header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .contact-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 20px;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 10px;
        }

        .contact-info a {
            color: var(--text-sub);
            text-decoration: none;
        }

        .contact-info a:hover {
            color: var(--input-focus);
        }

        .search-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 10px;
            position: sticky;
            top: 15px;
            z-index: 100;
        }

        #searchInput {
            width: 100%;
            padding: 16px 24px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background-color: var(--search-bg);
            color: var(--text-main);
            font-size: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        #searchInput:focus { border-color: var(--input-focus); }

        #tagCloud {
            max-width: 800px;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 30px;
            padding: 10px;
            justify-content: center;
        }

        .tag-btn {
            background: var(--tag-bg);
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .tag-btn:hover { background: var(--input-focus); color: white; border-color: var(--input-focus); }

        .year-section { width: 100%; max-width: 900px; margin-top: 40px; }
        .year-title { font-size: 2.2rem; font-weight: 800; margin-bottom: 20px; border-left: 6px solid var(--text-sub); padding-left: 15px; }

        .book-section {
            width: 100%;
            margin-bottom: 30px;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border-top: 8px solid #ccc;
        }

        .book-header { padding: 18px 20px; font-weight: 800; font-size: 1.1rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 0.95rem; line-height: 1.4; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(128,128,128,0.05); }
        .page-col { width: 100px; font-weight: 700; text-align: right; color: var(--text-sub); }
        .no-results { display: none; margin-top: 60px; color: var(--text-sub); font-size: 1.2rem; }

        @media (max-width: 600px) {
            .contact-info { grid-template-columns: 1fr; }
        }
    </style>
</head>

        ];

        const isEn = (navigator.language || navigator.userLanguage).startsWith('en');
        const isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        const contentArea = document.getElementById('contentArea');
        const searchInput = document.getElementById('searchInput');
        const tagCloud = document.getElementById('tagCloud');

        function formatText(text) {
            return text.replace(/#/g, ' #').replace(/\s+/g, ' ').trim();
        }

        function getYearColor(year, text) {
            let hash = 0;
            for (let i = 0; i < text.length; i++) hash = text.charCodeAt(i) + ((hash << 5) - hash);
            const hueShift = Math.abs(hash) % 30; 
            const lightness = isDarkMode ? '65%' : '45%';
            const saturation = isDarkMode ? '50%' : '70%';
            if (year === 2025) return `hsl(${210 + hueShift}, ${saturation}, ${lightness})`; 
            if (year === 2026) return `hsl(${275 + hueShift}, ${isDarkMode ? '45%' : '60%'}, ${lightness})`; 
            return "#ccc";
        }

        function getAllTags() {
            const allText = data.map(i => i.de + " " + i.en).join(" ");
            const matches = allText.match(/#[A-Za-z0-9']+/g);
            return [...new Set(matches)].sort();
        }

        function initTags() {
            const tags = getAllTags();
            tagCloud.innerHTML = tags.map(t => `<button class="tag-btn">${t}</button>`).join("");
            tagCloud.querySelectorAll('.tag-btn').forEach(btn => {
                btn.onclick = () => {
                    searchInput.value = btn.innerText;
                    render(btn.innerText);
                };
            });
        }

        searchInput.onfocus = () => tagCloud.style.display = "flex";

        function render(filter = "") {
            contentArea.innerHTML = "";
            const query = filter.toLowerCase();
            
            const filtered = data.filter(item => 
                item.de.toLowerCase().includes(query) || 
                item.en.toLowerCase().includes(query) ||
                item.bDe.toLowerCase().includes(query) ||
                item.bEn.toLowerCase().includes(query)
            );

            const noRes = document.getElementById('noResults');
            noRes.innerText = isEn ? "No matches found." : "Keine Treffer gefunden.";
            noRes.style.display = filtered.length ? "none" : "block";

            const years = [...new Set(filtered.map(item => item.year))].sort((a, b) => a - b);

            years.forEach(year => {
                const yearSection = document.createElement('div');
                yearSection.className = 'year-section';
                yearSection.innerHTML = `<div class="year-title">${year}</div>`;
                
                const yearData = filtered.filter(item => item.year === year);
                const bookGroups = yearData.reduce((acc, item) => {
                    const key = isEn ? item.bEn : item.bDe;
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(item);
                    return acc;
                }, {});

                for (const bookName in bookGroups) {
                    const color = getYearColor(year, bookName);
                    const section = document.createElement('div');
                    section.className = 'book-section';
                    section.style.borderTopColor = color;
                    
                    const rows = bookGroups[bookName].map(item => `
                        <tr>
                            <td>${formatText(isEn ? item.en : item.de)}</td> 
                            <td class="page-col">${item.page}</td>
                        </tr>
                    `).join('');

                    section.innerHTML = `<div class="book-header" style="color:${color}">${bookName}</div><table><tbody>${rows}</tbody></table>`;
                    yearSection.appendChild(section);
                }
                contentArea.appendChild(yearSection);
            });
        }

        document.getElementById('mainHeader').innerText = isEn ? "Library Registry" : "Bibliothek Register";
        searchInput.placeholder = isEn ? "Search content, tags or books..." : "Inhalt, Tags oder Bücher suchen...";

        searchInput.addEventListener('input', e => render(e.target.value));
        initTags();
        render();
    </script>
</body>
</html>
