    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-sub: #6c757d;
            --search-bg: #ffffff;
            --border: #e9ecef;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #f8f9fa;
                --text-sub: #adb5bd;
                --search-bg: #2d2d2d;
                --border: #333333;
            }
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            position: sticky;
            top: 15px;
            z-index: 100;
        }

        #searchInput {
            width: 100%;
            padding: 16px 24px;
            border-radius: 50px;
            border: 2px solid var(--border);
            background-color: var(--search-bg);
            color: var(--text-main);
            font-size: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            outline: none;
            box-sizing: border-box;
        }

        .year-section {
            width: 100%;
            max-width: 900px;
            margin-top: 40px;
        }

        .year-title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 20px;
            padding-left: 10px;
            border-left: 5px solid var(--text-main);
        }

        .book-section {
            width: 100%;
            margin-bottom: 30px;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 8px solid #ccc;
        }

        .book-header {
            padding: 15px 20px;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
        }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px 20px; background: rgba(0,0,0,0.02); color: var(--text-sub); font-size: 0.8rem; text-transform: uppercase; }
        td { padding: 12px 20px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }
        tr:last-child td { border-bottom: none; }
        .page-col { width: 100px; font-weight: 700; text-align: right; }
        .no-results { display: none; margin-top: 60px; color: var(--text-sub); }
    </style>
</head>

        const contentArea = document.getElementById('contentArea');
        const searchInput = document.getElementById('searchInput');

        document.getElementById('mainHeader').innerText = isEn ? "Library Registry" : "Bibliothek Register";
        searchInput.placeholder = isEn ? "Search..." : "Suchen...";

        function getBookColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsl(${Math.abs(hash) % 360}, 65%, 50%)`;
        }

        function render(filter = "") {
            contentArea.innerHTML = "";
            const query = filter.toLowerCase();

            const filtered = data.filter(item => 
                (isEn ? item.en : item.de).toLowerCase().includes(query) || 
                (isEn ? item.bEn : item.bDe).toLowerCase().includes(query)
            );

            document.getElementById('noResults').innerText = isEn ? "No results found." : "Keine Treffer gefunden.";
            document.getElementById('noResults').style.display = filtered.length ? "none" : "block";

            // Gruppieren nach Jahr
            const years = [...new Set(filtered.map(item => item.year))].sort((a, b) => a - b);

            years.forEach(year => {
                const yearSection = document.createElement('div');
                yearSection.className = 'year-section';
                yearSection.innerHTML = `<div class="year-title">${year}</div>`;
                
                const yearData = filtered.filter(item => item.year === year);
                const bookGroups = yearData.reduce((acc, item) => {
                    const key = isEn ? item.bEn : item.bDe;
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(item);
                    return acc;
                }, {});

                for (const bookName in bookGroups) {
                    const color = getBookColor(bookName);
                    const section = document.createElement('div');
                    section.className = 'book-section';
                    section.style.borderTopColor = color;
                    
                    const rows = bookGroups[bookName].map(item => `
                        <tr>
                            <td>${isEn ? item.en : item.de}</td>
                            <td class="page-col">${item.page}</td>
                        </tr>
                    `).join('');

                    section.innerHTML = `
                        <div class="book-header" style="color:${color}">${bookName}</div>
                        <table><tbody>${rows}</tbody></table>
                    `;
                    yearSection.appendChild(section);
                }
                contentArea.appendChild(yearSection);
            });
        }

        searchInput.addEventListener('input', e => render(e.target.value));
        render();
