    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #65676b;
            --border: #dddfe2;
            --accent: #007bff;
            --btn-hover: #e4e6eb;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --toggle-bg: #ddd;
        }

        [data-theme="dark"] {
            --bg-color: #18191a;
            --card-bg: #242526;
            --text-main: #e4e6eb;
            --text-sub: #b0b3b8;
            --border: #3e4042;
            --accent: #4599ff;
            --btn-hover: #3a3b3c;
            --shadow: 0 4px 15px rgba(0,0,0,0.3);
            --toggle-bg: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 20px 140px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
        }

        /* Top Bar Controls */
        .top-bar {
            position: fixed;
            top: 20px;
            width: 90%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
        }

        /* Language Button */
        .lang-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Theme Toggle Switch */
        .theme-switch {
            width: 80px;
            height: 40px;
            background: var(--toggle-bg);
            border-radius: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 5px;
            cursor: pointer;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .theme-switch span { font-size: 1.2rem; z-index: 2; opacity: 0.3; transition: opacity 0.3s; }
        .theme-switch span.active { opacity: 1; }
        
        .switch-handle {
            position: absolute;
            width: 34px;
            height: 34px;
            background: var(--card-bg);
            border-radius: 50%;
            left: 3px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1;
        }
        [data-theme="dark"] .switch-handle { transform: translateX(40px); }

        /* Contact Icons */
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
            margin: 80px 0 40px 0;
        }

        .icon-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            aspect-ratio: 1;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 1.8rem;
            box-shadow: var(--shadow);
            transition: transform 0.1s;
        }
        .icon-btn:active { transform: scale(0.9); }

        /* Content Sections */
        .year-wrapper { width: 100%; max-width: 800px; margin-bottom: 15px; }

        .year-btn {
            width: 100%;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        .year-btn::after { content: '▾'; color: var(--text-sub); transition: transform 0.3s; }
        .year-btn.collapsed::after { transform: rotate(-90deg); }

        .year-content { overflow: hidden; transition: max-height 0.3s ease-out; }
        .year-content.hidden { display: none; }

        .book-title {
            padding: 20px 10px 10px 10px;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
        }

        .entry-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            margin-bottom: 10px;
            padding: 16px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: var(--shadow);
        }
        .entry-card:hover { background: var(--btn-hover); }

        .page-tag {
            background: var(--bg-color);
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: 700;
            color: var(--text-sub);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* Search */
        .search-container {
            position: fixed;
            bottom: 30px;
            width: 90%;
            max-width: 500px;
            z-index: 1000;
        }

        #searchInput {
            width: 100%;
            padding: 18px 30px;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 1.1rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            outline: none;
        }

        #toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            display: none;
            z-index: 2000;
        }
    </style>
</head>

        let isEn = false;
        let isDark = false;

        const ui = {
            de: { search: "Suche...", copy: "Kopiert!", p: "S." },
            en: { search: "Search...", copy: "Copied!", p: "p." }
        };

        const themeToggle = document.getElementById('themeToggle');
        const langToggle = document.getElementById('langToggle');
        const searchInput = document.getElementById('searchInput');

        // Toggle Theme
        themeToggle.onclick = () => {
            isDark = !isDark;
            document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            document.getElementById('sunIcon').className = isDark ? '' : 'active';
            document.getElementById('moonIcon').className = isDark ? 'active' : '';
        };

        // Toggle Language
        langToggle.onclick = () => {
            isEn = !isEn;
            langToggle.innerText = isEn ? "EN" : "DE";
            updateUI();
        };

        function updateUI() {
            searchInput.placeholder = isEn ? ui.en.search : ui.de.search;
            render(searchInput.value);
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            const t = document.getElementById('toast');
            t.innerText = isEn ? ui.en.copy : ui.de.copy;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 1000);
        }

        function render(filter = "") {
            const area = document.getElementById('contentArea');
            area.innerHTML = "";
            const query = filter.toLowerCase();
            const filtered = data.filter(i => (isEn ? i.en : i.de).toLowerCase().includes(query));
            
            const years = [...new Set(filtered.map(i => i.year))].sort((a,b) => b-a);

            years.forEach(year => {
                const wrapper = document.createElement('div');
                wrapper.className = 'year-wrapper';

                const btn = document.createElement('div');
                btn.className = 'year-btn';
                btn.innerHTML = `<span>${year}</span>`;
                
                const content = document.createElement('div');
                content.className = 'year-content';
                
                // Toggle Logic
                btn.onclick = () => {
                    btn.classList.toggle('collapsed');
                    content.classList.toggle('hidden');
                };

                const yearData = filtered.filter(i => i.year === year);
                const books = [...new Set(yearData.map(i => isEn ? i.bEn : i.bDe))];

                books.forEach(book => {
                    const bTitle = document.createElement('div');
                    bTitle.className = 'book-title';
                    bTitle.innerText = book;
                    content.appendChild(bTitle);

                    yearData.filter(i => (isEn ? i.bEn : i.bDe) === book).forEach(entry => {
                        const card = document.createElement('div');
                        card.className = 'entry-card';
                        const label = isEn ? entry.en : entry.de;
                        const pLabel = isEn ? ui.en.p : ui.de.p;
                        card.innerHTML = `<span>${label}</span><div class="page-tag">${pLabel} ${entry.page}</div>`;
                        card.onclick = () => copy(`${label}, ${pLabel} ${entry.page}`);
                        content.appendChild(card);
                    });
                });

                wrapper.appendChild(btn);
                wrapper.appendChild(content);
                area.appendChild(wrapper);
            });
        }

        searchInput.oninput = (e) => render(e.target.value);
        updateUI();
    </script>
</body>
</html>
